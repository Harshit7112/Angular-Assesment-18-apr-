<div class="mt-3">

  <h5>Product List</h5>

  <a routerLink="/search" class="btn btn-secondary btn-sm mb-2">
    Back to Search
  </a>

  <table class="table table-bordered table-sm">

    <thead class="table-light">
      <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Price</th>
        <th>Category</th>
        <th>Option</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngIf="products.length === 0">
        <td colspan="5" class="text-center">No products available</td>
      </tr>

      <tr *ngFor="let product of products">
        <td>{{ product.pid }}</td>
        <td>{{ product.pname }}</td>
        <td>{{ product.price | number:'1.0-0' }}</td>
        <td>{{ product.category }}</td>
        <td>
          <button class="btn btn-danger btn-sm"
                  (click)="deleteProduct(product.pid)">
            Delete
          </button>
        </td>
      </tr>

    </tbody>

  </table>

</div>
